name: Build Firmware

on:
  push:
    branches: [ main ]
    paths:
      - src/**
      - include/**
      - lib/**
      - scripts/**
      - platformio.ini
      - .github/workflows/build-firmware.yml
  pull_request:
    paths:
      - src/**
      - include/**
      - lib/**
      - scripts/**
      - platformio.ini
      - .github/workflows/build-firmware.yml
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PIO_ENV: 4d_systems_esp32s3_gen4_r8n16

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install platformio

      - name: Install dependencies
        run: pio pkg install -e $PIO_ENV

      - name: Build firmware
        run: pio run -e $PIO_ENV

      - name: Prepare firmware.bin
        shell: bash
        run: |
          mkdir -p dist
          cp .pio/build/$PIO_ENV/firmware.bin dist/firmware.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: dist/firmware.bin

      - name: Generate auto tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: auto_tag
        run: echo "tag=v0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag in repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.auto_tag.outputs.tag }}';
            const sha = context.sha;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha,
            });

      - name: Create release and upload firmware.bin
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.auto_tag.outputs.tag }}
          name: ${{ steps.auto_tag.outputs.tag }}
          generate_release_notes: true
          files: dist/firmware.bin
          fail_on_unmatched_files: true
