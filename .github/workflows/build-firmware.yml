name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Optional tag to publish release (example: v0.0.2)"
        required: false
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
  push:
    branches: [ main ]
    tags:
      - "v*"
      - "*.*.*"
    paths:
      - src/**
      - include/**
      - lib/**
      - scripts/**
      - platformio.ini
      - .github/workflows/build-firmware.yml
  pull_request:
    paths:
      - src/**
      - include/**
      - lib/**
      - scripts/**
      - platformio.ini
      - .github/workflows/build-firmware.yml
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PIO_ENV: 4d_systems_esp32s3_gen4_r8n16

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install platformio

      - name: Install dependencies
        run: pio pkg install -e $PIO_ENV

      - name: Build firmware
        run: pio run -e $PIO_ENV

      - name: Prepare firmware.bin
        shell: bash
        run: |
          mkdir -p dist
          cp .pio/build/$PIO_ENV/firmware.bin dist/firmware.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: dist/firmware.bin

      - name: Create/Update Release (from tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/firmware.bin
          fail_on_unmatched_files: true

      - name: Create/Update Release (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || github.event.inputs.tag_name }}
          generate_release_notes: true
          files: dist/firmware.bin
          fail_on_unmatched_files: true
